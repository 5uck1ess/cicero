name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: requirements/**/*.txt
          cache-suffix: ci-test
      - run: bun install --frozen-lockfile
      - run: bun x tsc --noEmit
      - run: bun test
      - run: python3 -m unittest discover -s sidecars/telegram-call -p 'test_*.py'
      - run: uv run --python 3.11 --with-requirements requirements/telegram-call.txt python sidecars/telegram-call/native_contract.py

  python-sidecars:
    name: Python sidecars (${{ matrix.python-version }}, ${{ matrix.resolution }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        resolution: [highest, lowest-direct]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: requirements/**/*.txt
          cache-suffix: python-sidecars-${{ matrix.resolution }}
      - name: Test admission and model-free native contracts
        run: uv run --python ${{ matrix.python-version }} --resolution ${{ matrix.resolution }} --with-requirements requirements/sidecar-contract-test.txt python -m unittest discover -s tests/python -p 'test_*.py'
