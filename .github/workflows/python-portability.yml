name: Python portability

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  resolver:
    name: Python paths and manifests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python_platform: linux
          - os: windows-latest
            python_platform: windows
          # Current MLX wheels start at macOS 14; this native arm64 runner
          # verifies the documented floor instead of cross-resolving as macOS 13.
          - os: macos-14
            python_platform: macos
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: requirements/**/*.txt
          cache-suffix: python-portability
      - run: bun install --frozen-lockfile
      - name: Create native Python environment
        run: uv venv .ci-native-venv --python 3.11
      - name: Install VibeVoice source smoke without model wheels
        run: |
          uv pip install --python .ci-native-venv --no-deps -r requirements/vibevoice-sources.txt
          uv pip install --python .ci-native-venv -r requirements/vibevoice-server.txt
      - name: Test native venv discovery and launch
        run: bun test tests/platform/python.test.ts tests/platform/python-native.test.ts
        env:
          CICERO_NATIVE_VENV: ${{ github.workspace }}/.ci-native-venv
      - name: Resolve Python manifests without installing model wheels
        run: bun scripts/check-python-manifests.ts --platform ${{ matrix.python_platform }}
